# Researcher Agent Prompt 模板
prompts:
  web_search:
    template: |
      搜索主题: {{topic}}
      要求:
      - 至少覆盖 3 个独立信息源
      - 标注每条信息的来源 URL 和发布时间
      - 区分事实性信息和观点性信息
      - 如有矛盾信息，同时列出并标注"待验证"

  fact_check:
    template: |
      请验证以下陈述的准确性:
      {{statement}}
      验证步骤:
      1. 查找权威来源
      2. 交叉验证
      3. 标注置信度 (高/中/低)
      4. 如无法验证，明确说明

  literature_review:
    template: |
      研究主题: {{topic}}
      请收集并整理相关资料:
      - 学术论文 (近 3 年)
      - 行业报告
      - 权威媒体文章
      - 按主题分类整理，标注来源

  daily_briefing:
    template: |
      行业: {{industry}}
      时间范围: 过去 24 小时
      请采集:
      1. 重要新闻 (标题 + 来源 + 一句话摘要)
      2. 关键数据指标
      3. 市场动态
      输出格式: 标题 + 分类 + 详细条目
