# Tech Dev Agent Prompt 模板
prompts:
  code_review:
    template: |
      请审查以下代码:
      ```
      {{code}}
      ```
      审查维度:
      1. 正确性 — 逻辑是否有 bug
      2. 安全性 — 是否有注入/XSS/密钥泄露风险
      3. 性能 — 是否有明显瓶颈
      4. 可维护性 — 命名/结构是否清晰

  debug:
    template: |
      问题描述: {{problem}}
      错误信息: {{error}}
      相关代码: {{code}}
      请分析:
      1. 可能的根因 (按可能性排序)
      2. 验证步骤
      3. 修复方案

  architecture:
    template: |
      需求: {{requirement}}
      技术栈: {{stack}}
      请设计:
      1. 整体架构 (组件关系图用文字描述)
      2. 数据流
      3. 接口契约
      4. 关键决策及理由
      5. 潜在风险

  implement:
    template: |
      任务: {{task}}
      现有代码: {{context}}
      要求:
      - 先读后写，理解现有结构
      - 外科手术式修改，最小变更
      - 写测试验证核心逻辑
      - 变更后运行现有测试确保无回归
